<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', path='main.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <title>{% block title %} {% endblock %}</title>
</head>
<body>
<aside>
    <img src="{{ url_for('static', path='logos/main_logo.gif') }}"  alt="Logo">
    <h3>Навигация</h3>
    <ul>
        <a href="{{ url_for('home_view') }}"><li>Главная</li></a>
        <a href="{{ url_for('upload_view') }}"><li>Загрузка документов</li></a>
        <a href="{{ url_for('analyse_view') }}"><li>Анализ документов</li></a>
        <a href="{{ url_for('get_text_view') }}"><li>Получение текста</li></a>
        <a href="{{ url_for('delete_view') }}"><li>Удаление документов</li></a>
    </ul>
</aside>
<main>
    {% block content %}
    {% endblock %}
</main>
</body>
</html>
